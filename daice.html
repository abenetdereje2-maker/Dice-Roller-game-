<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dice Roller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="dice-card">
            <h1>Dice Roller</h1>
            
            <div class="input-group">
                <label for="diceInput">Number of Dice:</label>
                <input type="number" id="diceInput" value="1" min="1" max="6">
            </div>

            <button onclick="rollDice()" id="rollBtn">Roll Dice</button>
            
            <div id="diceResultText">Roll to start!</div>
            <div id="diceImages"></div>
        </div>
    </div>
    <script src="java.js"></script>
</body>
</html>
